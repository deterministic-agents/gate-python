# gate-python embedded schema bundle - v1.1.0
#
# Schemas bundled with gate-python so the validation module can run
# without depending on the gate-contracts repo at runtime. Hashes below
# are pinned at release time; if the bundled schemas drift from
# gate-contracts the validator will silently disagree with peers.

gate_contracts_version: "1.1.0"
gate_contracts_source: "https://github.com/deterministic-agents/gate-contracts/releases/tag/v1.1.0"

# v1.0.0 schemas (carried forward unchanged from gate-python v1.0.0).
# Re-pin from gate-contracts v1.1.0 at release time.
